{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test Builder</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static 'css/create-test.css' %}" />
  </head>
  <body>
    <div class="app">
      <div class="topbar">
        <div class="topbar-left">
          <button class="back-btn" onclick="goBack()">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <polyline points="15 18 9 12 15 6" />
            </svg>
            <span id="back-btn-text">Mathematics</span>
          </button>
        </div>
        <div class="topbar-right">
          <button class="btn btn-primary" onclick="safeSaveTest()">
            Save Test
          </button>
        </div>
      </div>
      <div class="body">
        <div class="sidebar">
          <div class="sb-section">
            <div class="sb-header" onclick="toggleSb('create')">
              <div class="sb-header-left">
                <svg
                  class="sb-icon"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <circle cx="12" cy="12" r="10" />
                  <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
                  <line x1="12" y1="17" x2="12.01" y2="17" />
                </svg>
                Create Questions
              </div>
              <svg
                class="sb-arrow open"
                id="create-arrow"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <polyline points="18 15 12 9 6 15" />
              </svg>
            </div>
            <div class="sb-body open" id="create-body">
              <div class="q-type-list">
                <button class="q-type-btn" onclick="openAddQ('mcq')">
                  <div class="q-type-dot"></div>
                  Multiple Choice Questions
                </button>
                <button class="q-type-btn" onclick="openAddQ('tf')">
                  <div class="q-type-dot"></div>
                  True/False Questions
                </button>
                <button class="q-type-btn" onclick="openAddQ('comp')">
                  <div class="q-type-dot"></div>
                  Comprehension Questions
                </button>
                <button class="q-type-btn" onclick="openAddQ('fitb')">
                  <div class="q-type-dot"></div>
                  Fill In The Blanks
                </button>
                <button class="q-type-btn" onclick="openAddQ('int')">
                  <div class="q-type-dot"></div>
                  Integer Type Questions
                </button>
              </div>
            </div>
          </div>
          <div class="sb-section">
            <div class="sb-header" onclick="toggleSb('grading')">
              <div class="sb-header-left">
                <svg
                  class="sb-icon"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path
                    d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"
                  />
                </svg>
                Grading
              </div>
              <svg
                class="sb-arrow"
                id="grading-arrow"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <polyline points="6 9 12 15 18 9" />
              </svg>
            </div>
            <div class="sb-body" id="grading-body">
              <div style="padding: 14px 16px">
                <div class="form-row">
                  <div class="form-group">
                    <div class="form-label">Default +Marks</div>
                    <input
                      class="form-input"
                      type="number"
                      id="default-pos-marks"
                      name="default_pos_marks"
                      value="2"
                    />
                  </div>
                  <div class="form-group">
                    <div class="form-label">Default -Marks</div>
                    <input
                      class="form-input"
                      type="number"
                      id="default-neg-marks"
                      name="default_neg_marks"
                      value="1"
                    />
                  </div>
                </div>
                <button
                  class="btn btn-secondary btn-sm"
                  style="width: 100%"
                  onclick="applyGradingToAll()"
                >
                  Apply to All
                </button>
              </div>     
            </div>
          </div>
          <div class="sb-section">
            <div class="sb-header" onclick="toggleSb('sections')">
              <div class="sb-header-left">
                <svg
                  class="sb-icon"
                  viewBox="0 0 24 24"   
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <rect x="3" y="3" width="7" height="7" />
                  <rect x="14" y="3" width="7" height="7" />
                  <rect x="14" y="14" width="7" height="7" />
                  <rect x="3" y="14" width="7" height="7" />
                </svg>
                Test Sections
              </div>
              <svg
                class="sb-arrow"
                id="sections-arrow"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <polyline points="6 9 12 15 18 9" />
              </svg>
            </div>
            <div class="sb-body" id="sections-body">
              <div style="padding: 12px 16px">
                <button
                  class="add-section-btn"
                  style="margin-top: 0"
                  onclick="openAddSection()"
                >
                  + Add New Section
                </button>
              </div>
            </div>
          </div>
          <div class="sb-section">
            <div class="sb-header" onclick="toggleSb('import')">
              <div class="sb-header-left">
                <svg
                  class="sb-icon"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                  <polyline points="7 10 12 15 17 10" />
                  <line x1="12" y1="15" x2="12" y2="3" />
                </svg>
                Import Questions
              </div>
              <svg
                class="sb-arrow"
                id="import-arrow"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <polyline points="6 9 12 15 18 9" />
              </svg>
            </div>
            <div class="sb-body" id="import-body">
              <div class="import-body">
                <button class="import-btn" onclick="openWordUpload()">
                  Upload Word File
                  <svg
                    width="14"
                    height="14"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                  >
                    <polyline points="9 18 15 12 9 6" />
                  </svg>
                </button>
                <div class="sample-link">Download Sample Word File Format</div>
              </div>
            </div>
          </div>
        </div>

        <div class="main" id="main-content">
          <div class="test-meta-card">
            <div class="test-meta-top">
              <span class="test-meta-title">Test Details</span>
              <button class="edit-icon" onclick="openTestDetails()">
                <svg
                  width="15"
                  height="15"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path
                    d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"
                  />
                  <path
                    d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"
                  />
                </svg>
              </button>
            </div>
            <div class="test-meta-info">
              <div class="meta-chip">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <circle cx="12" cy="12" r="10" />
                  <polyline points="12 6 12 12 16 14" />
                </svg>
                Test Duration: <strong id="meta-duration">1 hr</strong>
              </div>
              <div class="meta-chip">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path
                    d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"
                  />
                  <line x1="7" y1="7" x2="7.01" y2="7" />
                </svg>
                Tags: <strong id="meta-tags">SCHOLARSHIP TEST</strong>
              </div>
            </div>
            <div class="test-instructions" onclick="openTestDetails()">
              <span id="instructions-text"
                >Test Instructions: Click here to add</span
              >
            </div>
          </div>
          <div id="sections-container"></div>
          <button class="add-section-btn" onclick="openAddSection()">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <line x1="12" y1="5" x2="12" y2="19" />
              <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            Add New Section
          </button>
        </div>
      </div>
    </div>
    <div id="modal-root"></div>
    <div id="img-root"></div>

    <script>
      (function () {
        function hasRealSaveTest() {
          return (
            typeof window.saveTest === "function" &&
            window.saveTest !== fallbackSaveTest
          );
        }

        function retryLoadSaveScript() {
          var script = document.querySelector("script[data-create-test]");
          if (!script) {
            alert("Save script is not available. Please refresh the page.");
            return;
          }

          var retry = document.createElement("script");
          retry.src = script.getAttribute("src");
          retry.onload = function () {
            if (hasRealSaveTest()) {
              window.saveTest();
            } else {
              alert("Save is still unavailable. Please refresh the page.");
            }
          };
          retry.onerror = function () {
            alert("Failed to load save script. Please refresh the page.");
          };
          document.body.appendChild(retry);
        }

        function fallbackSaveTest() {
          if (hasRealSaveTest()) {
            window.saveTest();
            return;
          }

          retryLoadSaveScript();
        }

        window.safeSaveTest = fallbackSaveTest;
        window.saveTest = fallbackSaveTest;
      })();
    </script>
    <script
      data-create-test
      src="{% static 'js/create-test.js' %}?v={% now 'U' %}"
    ></script>
  </body>
</html>
