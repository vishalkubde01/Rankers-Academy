{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Student Diagnostic System</title>

    <!-- Inter Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static 'css/bridge-course-login.css' %}" />
  </head>

  <body>
    {% csrf_token %}

    <div class="page">
      <!-- HEADER -->

      <div class="header">
        <div class="logo">
          <i class="bi bi-mortarboard-fill"></i>
        </div>

        <h2>Student Diagnostic System</h2>
        <p>Smart Learning Analytics Platform</p>
      </div>

      <!-- LOGIN CARD -->

      <div class="login-card">
        <h3>Bridge Course Sign In</h3>

        <!-- STEP 1 -->

        <div id="step1">
          <div class="input-box">
            <i class="bi bi-book icon"></i>

            <select id="board">
              <option value="">Select Board</option>
              <option>State Board</option>
              <option>CBSE</option>
              <option>ICSE</option>
            </select>
          </div>

          <div class="input-box">
            <i class="bi bi-mortarboard icon"></i>

            <select id="class">
              <option value="">Select Grade/Class</option>
              <option>8th</option>
              <option>9th</option>
              <option>10th</option>
              <option>11th</option>
              <option>12th</option>
            </select>
          </div>

          <button class="btn-main" onclick="nextStep()">Continue</button>
        </div>

        <!-- STEP 2 -->

        <div id="step2">
          <div class="input-box">
            <i class="bi bi-person icon"></i>
            <input type="text" id="name" placeholder="Enter Name" />
          </div>

          <div class="input-box">
            <i class="bi bi-phone icon"></i>
            <input
              type="text"
              id="mobile"
              placeholder="Enter Mobile Number"
              maxlength="10"
            />
          </div>

          <button class="btn-main" onclick="sendOTP()">Send OTP</button>
        </div>

        <!-- STEP 3 -->

        <div id="step3">
          <div class="input-box">
            <i class="bi bi-shield-lock icon"></i>
            <input type="text" id="otp" placeholder="Enter OTP" />
          </div>

          <button class="btn-main" onclick="verifyOTP()">Verify OTP</button>
        </div>
      </div>
    </div>

    <script src="{% static 'js/bridge-course-login.js' %}"></script>
  </body>
</html>
