{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Access Denied - Student Diagnostic System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'DM Sans', sans-serif; background: #f4f9fc; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .error-container { text-align: center; padding: 40px; }
    .error-icon { font-size: 64px; color: #dc2626; margin-bottom: 20px; }
    h1 { font-size: 24px; color: #333; margin-bottom: 12px; }
    p { color: #64748b; margin-bottom: 24px; }
    .btn-primary { background: linear-gradient(90deg, #0d6efd, #0891b2); border: none; border-radius: 10px; padding: 12px 24px; font-weight: 500; text-decoration: none; color: white; }
  </style>
</head>
<body>
<div class="error-container">
  <i class="bi bi-shield-lock error-icon"></i>
  <h1>Access Denied</h1>
  <p>{{ message|default:"You are not authorized to view this page." }}</p>
  <a href="/" class="btn btn-primary">Go to Home</a>
</div>
</body>
</html>
